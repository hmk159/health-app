<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>健康记录</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <nav class="rail">
            <div class="rail-item active" data-view="dashboard">
                <span class="icon">🏠</span>
                <span>首页</span>
            </div>
            <div class="rail-item" data-view="records">
                <span class="icon">📝</span>
                <span>记录</span>
            </div>
            <div class="rail-item" data-view="trends">
                <span class="icon">📊</span>
                <span>趋势</span>
            </div>
            <div class="rail-item" data-view="settings">
                <span class="icon">⚙️</span>
                <span>设置</span>
            </div>
        </nav>

        <main class="content">
            <section id="dashboard" class="view active">
                <h1>今日健康状况</h1>
                <div class="cards" id="dashboard-cards"></div>
                <button class="fab" id="add-btn">+ 记录身体状况</button>
            </section>

            <section id="records" class="view">
                <h1>记录列表</h1>
                <div class="list" id="records-list"></div>
            </section>

            <section id="trends" class="view">
                <h1>趋势统计</h1>
                <div class="trends" id="trends-list"></div>
            </section>

            <section id="settings" class="view">
                <h1>设置</h1>
                <div class="settings-card">
                    <p>应用版本：1.0</p>
                    <p>数据存储：本地</p>
                    <p>布局：平板横屏适配</p>
                    <button class="btn-secondary" id="clear-data">清空所有数据</button>
                </div>
            </section>
        </main>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2>记录身体状况</h2>
            <label>类型</label>
            <select id="type">
                <option value="weight">体重 (kg)</option>
                <option value="temperature">体温 (°C)</option>
                <option value="blood-pressure">血压 (mmHg)</option>
                <option value="heart-rate">心率 (bpm)</option>
                <option value="steps">步数</option>
                <option value="sleep">睡眠 (小时)</option>
                <option value="water">饮水 (ml)</option>
                <option value="symptom">症状 / 备注</option>
            </select>
            <label>数值</label>
            <input type="number" id="value" placeholder="输入数值">
            <div id="value2-wrapper" style="display:none;">
                <label>舒张压</label>
                <input type="number" id="value2" placeholder="舒张压">
            </div>
            <label>备注</label>
            <input type="text" id="note" placeholder="可选">
            <div class="modal-actions">
                <button class="btn-secondary" id="cancel-btn">取消</button>
                <button class="btn-primary" id="save-btn">保存</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
